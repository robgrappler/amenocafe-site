  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-hueso: #FAF9F6;
      --color-cafe: #2C1B18;
      --color-dorado: #D4A373;
      --color-dorado-light: #E8C9A0;
      --color-crema: #F5F0EB;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Montserrat', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background:
        linear-gradient(180deg, #fcfbf8 0%, #f4efe7 100%);
      color: var(--color-cafe);
    }

    .page-photo {
      filter: blur(18px) saturate(0.72) brightness(1.08);
      opacity: 0.22;
      transform: scale(1.08);
      mix-blend-mode: soft-light;
    }

    .grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.22'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    .float-slow {
      animation: float-slow 12s ease-in-out infinite;
    }
    .float-delayed {
      animation: float-slow 15s ease-in-out infinite;
      animation-delay: -4s;
    }
    @keyframes float-slow {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -14px, 0); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: 90ms; }
    .delay-2 { animation-delay: 180ms; }
    .delay-3 { animation-delay: 270ms; }
    .delay-4 { animation-delay: 360ms; }

    .chip {
      border: 1px solid rgba(44, 27, 24, 0.12);
      background: rgba(250, 249, 246, 0.72);
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }
    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(212, 163, 115, 0.4);
      background: rgba(255, 253, 250, 0.9);
    }

    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(212, 163, 115, 0.15); }
      50%       { box-shadow: 0 0 0 10px rgba(212, 163, 115, 0.05); }
    }

    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: #D4A373;
      box-shadow: 0 0 0 6px rgba(212, 163, 115, 0.15);
      animation: dot-pulse 2.4s ease-in-out infinite;
    }

    .fab-wa {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 50;
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 999px;
      background: #25D366;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.38);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .fab-wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(37, 211, 102, 0.48);
    }

  </style>
</head>
